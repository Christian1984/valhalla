name: Build and push Docker image

on:
  push:
    branches:
      - curvymap

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (local only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: valhalla-curvymap-builder:local
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-scripted
          push: true
          tags: |
            ghcr.io/christian1984/valhalla-curvymap:latest
            ghcr.io/christian1984/valhalla-curvymap:${{ github.sha }}
          build-args: |
            VALHALLA_BUILDER_IMAGE=valhalla-curvymap-builder:local
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
