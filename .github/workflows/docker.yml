name: Build and push Docker image

on:
  push:
    branches:
      - curvymap

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/christian1984/valhalla-curvymap-builder:${{ github.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-scripted
          push: true
          tags: |
            ghcr.io/christian1984/valhalla-curvymap:latest
            ghcr.io/christian1984/valhalla-curvymap:${{ github.sha }}
          build-args: |
            VALHALLA_BUILDER_IMAGE=ghcr.io/christian1984/valhalla-curvymap-builder:${{ github.sha }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

      - name: Delete builder image from GHCR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_ID=$(gh api "/user/packages/container/valhalla-curvymap-builder/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${{ github.sha }}\") | .id")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE "/user/packages/container/valhalla-curvymap-builder/versions/${VERSION_ID}"
          fi
